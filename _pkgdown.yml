url: https://gideon-ntiboateng.github.io/milt

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: "milt — Modern Integrated Library for Timeseries"
  description: >
    A unified R API for time series forecasting, anomaly detection,
    classification, and clustering. Think Python's Darts/sktime, but
    natively in R with a tidyverse-friendly interface.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/gideon-ntiboateng/milt

articles:
  - title: "Get started"
    navbar: ~
    contents:
      - milt-forecasting
  - title: "Core workflows"
    navbar: "Core workflows"
    contents:
      - milt-anomaly-detection
      - milt-pipelines
      - milt-multi-series
  - title: "Advanced"
    navbar: "Advanced"
    contents:
      - milt-deep-learning
      - milt-deployment

reference:
  - title: "Series"
    desc: "Create and manipulate MiltSeries objects"
    contents:
      - milt_series
      - milt_window
      - milt_split
      - milt_concat
      - milt_resample
      - milt_fill_gaps

  - title: "Models"
    desc: "Train and forecast with time series models"
    contents:
      - milt_model
      - milt_fit
      - milt_forecast
      - milt_refit
      - milt_backtest
      - milt_compare
      - milt_ensemble
      - milt_local_model

  - title: "Feature Engineering"
    desc: "Build lag, rolling, and calendar features for ML models"
    contents:
      - milt_step_lag
      - milt_step_roll
      - milt_step_fourier
      - milt_step_calendar
      - milt_step_scale
      - milt_step_unscale

  - title: "Anomaly Detection"
    desc: "Detect outliers and anomalies in time series"
    contents:
      - milt_detector
      - milt_detect
      - milt_changepoints

  - title: "Multi-Series & Forecasting Hierarchy"
    desc: "Clustering, classification, and reconciliation"
    contents:
      - milt_cluster
      - milt_classifier
      - milt_classify_fit
      - milt_classify_predict
      - milt_reconcile

  - title: "Analysis"
    desc: "Exploratory data analysis and model explainability"
    contents:
      - milt_eda
      - milt_explain
      - milt_causal_impact

  - title: "Deployment"
    desc: "Save, serve, and share trained models"
    contents:
      - milt_save
      - milt_load
      - milt_serve
      - milt_dashboard
      - milt_report

  - title: "Deep Learning"
    desc: "Neural network backends (requires torch / reticulate + Darts)"
    contents:
      - milt_setup_darts

  - title: "Classes"
    desc: "S3 classes returned by milt functions"
    contents:
      - starts_with("MiltSeries")
      - starts_with("MiltForecast")
      - starts_with("MiltAnomal")
      - starts_with("MiltDetector")
      - starts_with("MiltChangepoint")
      - starts_with("MiltCluster")
      - starts_with("MiltClassifier")
      - starts_with("MiltEDA")
      - starts_with("MiltExplanation")
      - starts_with("MiltReconciliation")
      - starts_with("MiltCausalImpact")
      - starts_with("MiltScaleStep")
