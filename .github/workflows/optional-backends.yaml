on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

name: optional-backends

jobs:
  optional-backends:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::forecast
            any::glmnet
            any::ranger
            any::e1071
            any::xgboost
            any::changepoint
            any::CausalImpact
            any::jsonlite
            any::plumber
            local::.
          dependencies: '"hard"'

      - name: Run optional backend tests
        run: |
          devtools::test(filter = "backend|changepoint|explain|serve")
        shell: Rscript {0}
